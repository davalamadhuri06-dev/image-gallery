<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAlpha Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="gallery-header">
      <p class="eyebrow">CodeAlpha Task 1</p>
      <h1>Image Gallery</h1>
      <p>Browse curated nature, travel, and city photography with category filters and a lightbox viewer.</p>
    </header>

    <section class="toolbar" aria-label="Image categories">
      <button class="filter-btn active" type="button" data-filter="all">All</button>
      <button class="filter-btn" type="button" data-filter="nature">Nature</button>
      <button class="filter-btn" type="button" data-filter="travel">Travel</button>
      <button class="filter-btn" type="button" data-filter="city">City</button>
    </section>

    <section class="gallery" aria-label="Photo gallery">
      <article class="gallery-card" data-category="nature">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80" alt="Green hills beneath a warm sunrise" />
        <span>Nature</span>
      </article>
      <article class="gallery-card" data-category="travel">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=80" alt="Blue ocean waves rolling onto a beach" />
        <span>Travel</span>
      </article>
      <article class="gallery-card" data-category="city">
        <img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=900&q=80" alt="Modern city skyline at dusk" />
        <span>City</span>
      </article>
      <article class="gallery-card" data-category="nature">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=900&q=80" alt="Tall forest trees with sunlight in the distance" />
        <span>Nature</span>
      </article>
      <article class="gallery-card" data-category="travel">
        <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=900&q=80" alt="Desert road stretching through red mountains" />
        <span>Travel</span>
      </article>
      <article class="gallery-card" data-category="city">
        <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=900&q=80" alt="Colorful houses on a quiet street" />
        <span>City</span>
      </article>
      <article class="gallery-card" data-category="nature">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=900&q=80" alt="River winding through a mountain valley" />
        <span>Nature</span>
      </article>
      <article class="gallery-card" data-category="travel">
        <img src="https://images.unsplash.com/photo-1505761671935-60b3a7427bad?auto=format&fit=crop&w=900&q=80" alt="Historic bridge and city lights during evening" />
        <span>Travel</span>
      </article>
      <article class="gallery-card" data-category="city">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=900&q=80" alt="Glass buildings reflecting the sky" />
        <span>City</span>
      </article>
    </section>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="Image preview">
    <button class="lightbox-close" type="button" aria-label="Close preview">&times;</button>
    <button class="lightbox-nav prev" type="button" aria-label="Previous image">&#8249;</button>
    <figure class="lightbox-content">
      <img id="lightbox-img" src="" alt="" />
      <figcaption id="lightbox-caption"></figcaption>
    </figure>
    <button class="lightbox-nav next" type="button" aria-label="Next image">&#8250;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
